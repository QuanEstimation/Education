# 贝叶斯估计



一个量子比特系统的哈密顿量为
\begin{align}
H=\frac{B\omega_0}{2}(\sigma_1\cos{x}+\sigma_3\sin{x}),
\end{align}
其中 $B$ 为 XZ 平面内的磁场，$x$ 为未知参数，$\sigma_{1}$、$\sigma_{3}$ 为泡利矩阵。

探针态取为 $|\pm\rangle$。测量选用 $\{|\!+\rangle\langle+\!|,|\!-\rangle\langle-\!|\}$。这里 $|\pm\rangle:=\frac{1}{\sqrt{2}}(|0\rangle\pm|1\rangle)$，$|0\rangle$（$|1\rangle$）是 $\sigma_3$ 对应本征值 $1$（$-1$）的本征态。在本示例中，先验分布 $p(x)$ 为 $[0, \pi/2]$ 上的均匀分布。

[1] M. Zhang et al., QuanEstimation: an open-source toolkit for quantum parameter estimation,
 Phys. Rev. Res. 4, 043057 (2022).
