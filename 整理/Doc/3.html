# 贝叶斯克拉美-罗界的计算



处于 XZ 平面内磁场 $B$ 下的一个量子比特系统的哈密顿量为
\begin{align}
H=\frac{B\omega_0}{2}(\sigma_1\cos{x}+\sigma_3\sin{x})
\end{align}
其中 $x$ 为未知参数，$\sigma_{1}$、$\sigma_{3}$ 为泡利矩阵。

探针态取为 $\frac{1}{\sqrt{2}}(|0\rangle+|1\rangle)$，这里 $|0\rangle$ 和 $|1\rangle$ 是 $\sigma_3$ 对应本征值 $1$ 和 $-1$ 的本征态。用于经典界的测量是一组秩一对称信息完备正算子值测度（SIC-POVM）。

取高斯先验分布 $p(x)=\frac{1}{c\eta\sqrt{2\pi}}\exp\left({-\frac{(x-\mu)^2}{2\eta^2}}\right)$，定义在 $[-\pi/2, \pi/2]$ 上，其中 $\mu$ 和 $\eta$ 分别为期望和标准差。这里 $c=\frac{1}{2}\big[\mathrm{erf}(\frac{\pi-2\mu}{2\sqrt{2}\eta})+\mathrm{erf}(\frac{\pi+2\mu}{2\sqrt{2}\eta})\big]$ 是归一化系数，$\mathrm{erf}(x):=\frac{2}{\sqrt{\pi}}\int^x_0 e^{-t^2}\mathrm{d}t$ 为误差函数。

[1] M. Zhang et al., QuanEstimation: an open-source toolkit for quantum parameter estimation,
 Phys. Rev. Res. 4, 043057 (2022).
