Lipkin–Meshkov–Glick（LMG）模型的哈密顿量为
\begin{align}
H_{\mathrm{LMG}}=-\frac{\lambda}{N}(J_1^2+gJ_2^2)-hJ_3,
\end{align}
其中 $N$ 是系统的自旋数，$\lambda$ 是自旋-自旋相互作用强度，$h$ 是外场强度，$g$ 是各向异性参数。$J_i=\frac{1}{2}\sum_{j=1}^N \sigma_i^{(j)}$（$i=1,2,3$）是集体自旋算符，$\sigma_i^{(j)}$ 为第 $j$ 个自旋的第 $i$ 个泡利矩阵。在多参数情形下，$g$ 和 $h$ 被设为待估计的未知参数。态展开为 $|\psi\rangle=\sum^J_{m=-J}c_m|J,m\rangle$，其中 $|J,m\rangle$ 是迪克态，$c_m$ 为复系数。这里我们固定 $J=N/2$。在本例中，探针态分别在无噪声情形和集体退相位噪声下进行优化。集体退相位下的动力学可表示为
\begin{align}
\partial_t\rho = -i[H_{\mathrm{LMG}},\rho]+\gamma \left(J_3\rho J_3-\frac{1}{2}\left\{\rho, J^2_3\right\}\right)
\end{align}
其中 $\gamma$ 为衰减率。

在本例中，所有使用不同算法的搜索均从相干自旋态出发，该态定义为 $|\theta=\frac{\pi}{2},\phi=\frac{\pi}{2}\rangle=\exp(-\frac{\theta}{2}e^{-i\phi}J_{+}+\frac{\theta}{2}e^{i\phi}J_{-})|J,J\rangle$，其中 $J_{\pm}=J_1{\pm}iJ_2$。通过不同权重矩阵获得的最优态的性能有所不同，此处我们展示当 $W=\mathrm{diag}(1/3,2/3)$ 时的态优化结果。

 Phys. Rev. Res. 4, 043057 (2022).
